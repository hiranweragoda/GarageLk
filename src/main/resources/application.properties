spring.application.name=backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/garagelk_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Spring Boot session cookie settings (if we use HTTP sessions for login)
server.servlet.session.cookie.name=GARAGELK_SESSION
server.servlet.session.timeout=30m

# Gemini API Key Configuration
gemini.api.key=${GEMINI_API_KEY:}

