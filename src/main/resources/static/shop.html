<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Details - GarageLK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" id="header-logo">
                <i class="fa-solid fa-gears"></i>Garage<span>LK</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link" id="nav-home">Home</a>
                <a href="index.html#about" class="nav-link" id="nav-about">About</a>
                <a href="dashboard.html" class="nav-link" id="nav-dashboard">Dashboard</a>
            </nav>
            <div class="nav-right" style="display: flex; align-items: center; gap: 1rem;">
                <div class="nav-auth" id="nav-auth-container">
                    <!-- Dynamically populated by app.js -->
                    <a href="auth.html" class="btn btn-outline" id="btn-login-nav">Sign In</a>
                </div>
                <button class="theme-toggle" onclick="window.GarageLK.toggleTheme()" unique-id="theme-toggle-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Shop Core Header Section -->
        <div id="shop-profile-header">
            <!-- Dynamically populated banner image and details -->
        </div>

        <div class="details-grid" style="grid-template-columns: 1fr;">
            <!-- Main: Spare Parts Panel -->
            <div class="details-main">
                <div class="details-panel">
                    <h2><i class="fa-solid fa-gears"></i> Spare Parts Catalog</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">Explore spare parts currently in stock at this shop.</p>
                    <div class="garage-list-panel" id="parts-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; max-height: none; overflow: visible; width: 100%; padding: 0;">
                        <!-- Dynamic list of spare parts -->
                    </div>
                </div>

                <!-- Reviews Panel -->
                <div class="details-panel" style="margin-top: 2rem;">
                    <h2><i class="fa-solid fa-star"></i> Customer Reviews</h2>
                    <div id="reviews-container">
                        <!-- Dynamic reviews -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="max-width">
            <p>&copy; 2026 GarageLK. All rights reserved.</p>
        </div>
    </footer>

    <!-- App JavaScript -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load individual shop details
            if (window.GarageLK) {
                window.GarageLK.initShopDetails();
            }
        });
    </script>
    <!-- Reserve Spare Part Modal -->
    <div class="modal-overlay" id="modal-reserve-part">
        <div class="modal-content">
            <span class="modal-close" onclick="window.GarageLK.closeModal('modal-reserve-part')"><i class="fa-solid fa-xmark"></i></span>
            <h3 style="font-size: 1.3rem; margin-bottom: 1.5rem;"><i class="fa-solid fa-gears"></i> Reserve Spare Part</h3>
            <form onsubmit="window.GarageLK.submitPartReservation(event)">
                <input type="hidden" id="reserve-part-id">
                <div class="form-group">
                    <label>Part Name</label>
                    <input type="text" id="reserve-part-name" class="form-control" readonly style="background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label>Price (LKR)</label>
                    <input type="text" id="reserve-part-price" class="form-control" readonly style="background: rgba(255,255,255,0.05); color: var(--text-secondary); cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label for="reserve-quantity">Quantity to Reserve</label>
                    <input type="number" id="reserve-quantity" class="form-control" min="1" required value="1" oninput="window.GarageLK.updateReserveTotalPrice()">
                </div>
                <div class="form-group">
                    <label for="reserve-pickup-date">Estimated Pickup Date/Time</label>
                    <input type="datetime-local" id="reserve-pickup-date" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="reserve-notes">Notes / Special Instructions</label>
                    <textarea id="reserve-notes" class="form-control" rows="3" placeholder="Specify compatibility details, etc."></textarea>
                </div>
                <div style="margin: 1.5rem 0; padding: 1rem; background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: 600;">Total Estimate:</span>
                    <span id="reserve-total-price" style="font-size: 1.25rem; font-weight: 800; color: var(--secondary);">LKR 0.00</span>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;" unique-id="reserve-submit-btn">Confirm Reservation</button>
            </form>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
</body>
</html>
