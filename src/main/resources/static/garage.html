<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Details - GarageLK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" id="header-logo">
                <i class="fa-solid fa-gears"></i>Garage<span>LK</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link" id="nav-home">Home</a>
                <a href="index.html#about" class="nav-link" id="nav-about">About</a>
                <a href="dashboard.html" class="nav-link" id="nav-dashboard">Dashboard</a>
            </nav>
            <div class="nav-right" style="display: flex; align-items: center; gap: 1rem;">
                <div class="nav-auth" id="nav-auth-container">
                    <!-- Dynamically populated by app.js -->
                    <a href="auth.html" class="btn btn-outline" id="btn-login-nav">Sign In</a>
                </div>
                <button class="theme-toggle" onclick="window.GarageLK.toggleTheme()" unique-id="theme-toggle-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Garage Core Header Section -->
        <div id="garage-profile-header">
            <!-- Dynamically populated, example layout: -->
            <!-- Image Banner and Info -->
        </div>

        <div class="details-grid">
            <!-- Left Side: Services and Reviews -->
            <div class="details-main">
                <!-- Services Panel -->
                <div class="details-panel">
                    <h2><i class="fa-solid fa-screwdriver-wrench"></i> Available Services</h2>
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;">Select services below to add them to your booking request.</p>
                    <div id="services-container">
                        <!-- Dynamic list of services with select checkbox -->
                    </div>
                </div>

                <!-- Reviews Panel -->
                <div class="details-panel">
                    <h2><i class="fa-solid fa-star"></i> Customer Reviews</h2>
                    <div id="reviews-container">
                        <!-- Dynamic reviews -->
                    </div>
                </div>
            </div>

            <!-- Right Side: Booking Panel -->
            <div class="booking-sidebar">
                <div class="booking-card">
                    <h3 style="font-size: 1.3rem; margin-bottom: 1.5rem; text-align: center;">Book Appointment</h3>
                    <form id="form-booking" onsubmit="window.GarageLK.handleBookingSubmit(event)">
                        <div class="form-group">
                            <label for="booking-date">Select Date</label>
                            <input type="date" id="booking-date" class="form-control" required unique-id="booking-date-input">
                        </div>
                        <div class="form-group">
                            <label for="booking-time">Select Time Slot</label>
                            <select id="booking-time" class="form-control" required unique-id="booking-time-select">
                                <option value="">Select a Slot</option>
                                <option value="08:00 AM - 09:00 AM">08:00 AM - 09:00 AM</option>
                                <option value="09:00 AM - 10:00 AM">09:00 AM - 10:00 AM</option>
                                <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                                <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                                <option value="01:00 PM - 02:00 PM">01:00 PM - 02:00 PM</option>
                                <option value="02:00 PM - 03:00 PM">02:00 PM - 03:00 PM</option>
                                <option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
                                <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="booking-vehicletype">Vehicle Type</label>
                            <select id="booking-vehicletype" class="form-control" required unique-id="booking-vehicle-type-select">
                                <option value="Sedan">Sedan</option>
                                <option value="SUV">SUV</option>
                                <option value="Hatchback">Hatchback</option>
                                <option value="Motorcycle">Motorcycle</option>
                                <option value="Van">Van / Lorry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="booking-vehicleno">Vehicle Number</label>
                            <input type="text" id="booking-vehicleno" class="form-control" placeholder="e.g. WP CAB-1234" required unique-id="booking-vehicle-no-input">
                        </div>
                        <div class="form-group">
                            <label for="booking-desc">Service Description / Requests</label>
                            <textarea id="booking-desc" class="form-control" rows="3" placeholder="Explain details or issues..." unique-id="booking-desc-textarea"></textarea>
                        </div>

                        <!-- Booking Summary -->
                        <div class="booking-summary">
                            <h4 style="font-size: 0.9rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.25rem;">Cost Summary</h4>
                            <div id="booking-services-summary">
                                <!-- list of checked services and their prices -->
                                <p style="font-size: 0.85rem; color: var(--text-muted);">No services selected yet.</p>
                            </div>
                            <div class="summary-row total" style="margin-top: 0.75rem;">
                                <span>Estimated Total</span>
                                <span id="booking-total-price">LKR 0.00</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;" unique-id="booking-submit-btn">
                            <i class="fa-solid fa-calendar-check"></i> Request Booking
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="max-width">
            <p>&copy; 2026 GarageLK. All rights reserved.</p>
        </div>
    </footer>

    <!-- App JavaScript -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load individual garage details
            if (window.GarageLK) {
                window.GarageLK.initGarageDetails();
            }
        });
    </script>
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
