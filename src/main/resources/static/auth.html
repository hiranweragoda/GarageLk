<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GarageLK - Authenticate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

    <!-- Header & Navigation -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo" id="header-logo">
                <i class="fa-solid fa-gears"></i>Garage<span>LK</span>
            </a>
            <nav class="nav-links">
                <a href="index.html" class="nav-link" id="nav-home">Home</a>
                <a href="index.html#about" class="nav-link" id="nav-about">About</a>
                <a href="dashboard.html" class="nav-link" id="nav-dashboard">Dashboard</a>
            </nav>
            <div class="nav-right" style="display: flex; align-items: center; gap: 1rem;">
                <div class="nav-auth" id="nav-auth-container">
                    <a href="index.html" class="btn btn-outline">Back to Home</a>
                </div>
                <button class="theme-toggle" onclick="window.GarageLK.toggleTheme()" unique-id="theme-toggle-btn">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="auth-wrapper">
            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="window.GarageLK.switchAuthTab('login')">Sign In</div>
                <div class="auth-tab" id="tab-signup" onclick="window.GarageLK.switchAuthTab('signup')">Register</div>
            </div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="window.GarageLK.handleLogin(event)">
                <div class="form-group">
                    <label for="login-username">Username or Email Address</label>
                    <input type="text" id="login-username" class="form-control" placeholder="Enter username or email" required unique-id="login-username-input">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="Enter password" required unique-id="login-password-input">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" unique-id="login-submit-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <!-- Signup Form -->
            <form id="form-signup" onsubmit="window.GarageLK.handleSignup(event)" style="display: none;">
                <!-- Role Toggle -->
                <div class="form-group">
                    <label>I want to join as a</label>
                    <div class="auth-toggle-group">
                        <div class="auth-toggle-btn active" id="toggle-role-customer" onclick="window.GarageLK.setSignupRole('CUSTOMER')">Customer</div>
                        <div class="auth-toggle-btn" id="toggle-role-owner" onclick="window.GarageLK.setSignupRole('OWNER')">Garage Owner</div>
                    </div>
                    <input type="hidden" id="signup-role" value="CUSTOMER">
                </div>

                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" class="form-control" placeholder="Choose a username" required unique-id="signup-username-input">
                </div>
                <div class="form-group">
                    <label for="signup-fullname">Full Name</label>
                    <input type="text" id="signup-fullname" class="form-control" placeholder="Enter your full name" required unique-id="signup-fullname-input">
                </div>
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" class="form-control" placeholder="Enter email address" required unique-id="signup-email-input">
                </div>
                <div class="form-group">
                    <label for="signup-phone">Phone Number</label>
                    <input type="tel" id="signup-phone" class="form-control" placeholder="e.g. +94 77 123 4567" required unique-id="signup-phone-input">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" class="form-control" placeholder="Choose a strong password" required unique-id="signup-password-input">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" unique-id="signup-submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="max-width">
            <p>&copy; 2026 GarageLK. All rights reserved.</p>
        </div>
    </footer>

    <!-- App JavaScript -->
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is redirected to signup tab
            const urlParams = new URLSearchParams(window.location.search);
            const tab = urlParams.get('tab');
            if (tab === 'signup' && window.GarageLK) {
                window.GarageLK.switchAuthTab('signup');
            }
        });
    </script>
    <div class="toast-container" id="toast-container"></div>
</body>
</html>
